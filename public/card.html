<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume score — ResumeLeader</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,1,0&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff;
      padding: 32px 16px;
      font-family: 'Outfit', sans-serif;
    }

    .card {
      position: relative;
      width: 508px;
      height: 536px;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(107deg, #45A149 -7%, #5FBA6E 80%);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.04);
    }

    /* confetti dots layer (exported from Figma, pre-clipped) */
    .dots {
      position: absolute;
      left: 57px;
      top: 0;
      pointer-events: none;
    }

    /* ---- score block ---- */
    .score {
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
      text-align: center;
    }

    .score-num {
      line-height: 48px;
      white-space: nowrap;
    }
    .score-num .big {
      font-size: 40px;
      font-weight: 600;
      color: #fff;
    }
    .score-num .small {
      font-size: 18px;
      font-weight: 500;
      line-height: 26px;
      color: rgba(255, 255, 255, 0.5);
    }

    .badge {
      margin-top: 1px;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 6px;
      background: #FBC02D;
      border-radius: 6px;
      transform: rotate(-2deg);
      color: #000;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      white-space: nowrap;
    }
    .badge .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-size: 16px;
      line-height: 1;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }

    .headline { margin-top: 24px; }
    .headline h1 {
      font-size: 24px;
      font-weight: 600;
      line-height: 30px;
      color: #fff;
    }
    .headline p {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 400;
      line-height: 18px;
      color: rgba(255, 255, 255, 0.8);
    }

    /* ---- chips ---- */
    .chips {
      position: absolute;
      top: 206.83px;
      left: 50%;
      margin-left: -164px;
      width: 328px;
      height: 37px;
      z-index: 2;
    }
    .chip {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 34px;
      padding: 8px 12px;
      background: #834BFF;
      border-radius: 16px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      line-height: 18px;
      white-space: nowrap;
      transform-origin: 0 0;
    }
    .chip-icon { font-size: 16px; line-height: 1; }
    .chip-1 { left: 0; top: 2.65px; width: 143px; transform: rotate(-1deg); }
    .chip-2 { left: 167.05px; top: 0; width: 161px; transform: rotate(1deg); }

    /* ---- resume preview ---- */
    .resume {
      position: absolute;
      left: 43px;
      top: 227.64px;
      width: 422px;
      height: 473px;
      border-radius: 16px 16px 0 0;
      outline: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 4px 10px rgba(91, 91, 91, 0.16);
      z-index: 1;
    }
  </style>
</head>
